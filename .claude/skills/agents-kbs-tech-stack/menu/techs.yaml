# Curated tech menu for agents-kbs-tech-stack.
#
# Each tech entry drives BOTH the architect and developer agent scaffold without
# further interview — the menu IS the customization layer.
#
# Schema (every field required unless marked optional):
#
#   <slug>:
#     display_name: "Human-readable name"
#     description: "One-line scope"
#     primary_language: python | typescript | sql | bash | go | rust | java
#     recommended_mcps: ["mcp__id__*", ...]
#     default_threshold_architect: 0.85 | 0.90 | 0.95 | 0.98
#     default_threshold_developer: 0.85 | 0.90 | 0.95 | 0.98
#     agent_color_architect: blue | green | purple | orange | red | yellow
#     agent_color_developer: <same options>
#     kb_seed:
#       concepts: [<slug>, ...]    # 2–4 entries — each becomes concepts/<slug>.md
#       patterns: [<slug>, ...]    # 2–4 entries — each becomes patterns/<slug>.md
#       reference: [<slug>, ...]   # 1–3 entries — each becomes reference/<slug>.md
#     architect_capabilities: ["...", ...]   # 3–5 bullets, drive the "Use PROACTIVELY" line
#     developer_capabilities: ["...", ...]   # 3–5 bullets
#     memorable_maxim: "One-line maxim closing the agent file"
#     architect_mission: "One-sentence mission for the architect"
#     developer_mission: "One-sentence mission for the developer"
#   roles: [<role>, ...]   # OPTIONAL — default [architect, developer]; valid: architect, developer, troubleshooter
#                            See menu/roles.yaml for the role registry.
#   When roles includes 'troubleshooter', the tech entry MUST also declare:
#     troubleshooter_mission, troubleshooter_capabilities, default_threshold_troubleshooter, agent_color_troubleshooter
#
# Adding a new tech: see references/tech-menu-curation.md

react:
  display_name: React
  description: "React 19 + hooks + concurrent rendering + server components"
  primary_language: typescript
  recommended_mcps: ["mcp__context7__*", "mcp__ref__*"]
  default_threshold_architect: 0.90
  default_threshold_developer: 0.95
  agent_color_architect: purple
  agent_color_developer: blue
  kb_seed:
    concepts: [hooks-mental-model, concurrent-rendering, server-vs-client-components]
    patterns: [data-fetching, state-management, suspense-boundaries]
    reference: [hook-reference, error-boundary-patterns]
  architect_capabilities:
    - "Designing component trees and state-hoisting boundaries"
    - "Deciding server vs client component placement in App Router"
    - "Choosing Suspense and error-boundary granularity"
    - "Evaluating rendering strategies (SSR / SSG / RSC / CSR)"
  developer_capabilities:
    - "Writing hooks with correct dependency arrays and cleanup"
    - "Applying memoization only when measured (avoid premature memo)"
    - "Writing testing-library tests with act() compliance"
    - "Debugging concurrent-rendering edge cases (Suspense, transitions)"
  memorable_maxim: "Components are functions of props. Side effects belong in hooks, not bodies."
  architect_mission: "Decide React structure before code is written — wrong boundaries are cheap to draw, expensive to undo."
  developer_mission: "Ship hooks and components that survive concurrent rendering and re-render with intent."

